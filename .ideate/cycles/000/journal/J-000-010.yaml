  ### Changes delivered


  **WI-006 — beepboop-daemon.py TOCTOU + cleanup**

  - Probe-connect block inserted after _daemonize() prevents duplicate daemons
  when concurrent hook invocations race on startup

  - Dead code removed: _elapsed_samples(), _pending_start_sample global and all
  references

  - os._exit(0) replaces sys.exit(0) in both fork parents (prevents
  atexit/buffer-flush races)

  - os.chdir('/') added after setsid() for proper daemon hygiene


  **WI-007 — play-sound.sh GP-05 compliance**

  - Entire macOS afplay path (daemon startup, socket poll, IPC send) moved into
  ( ... ) 2>/dev/null & background subshell

  - play-sound.sh now returns immediately on macOS — fully fire-and-forget

  - IPC client wrapped in try/except Exception: pass — silent failure on any
  socket error

  - $PLAYER caching uses sys.argv[2] instead of shell interpolation (injection
  fix)

  - Accepted trade-off: first sound on cold daemon start may not play


  **WI-008 — hooks.json correctness**

  - SessionEnd: && → ; for unconditional stop-daemon.sh execution

  - StopFailure: added notify.sh chain with 'Task failed', timeout raised to 10


  **WI-009 — stop-daemon.sh graceful shutdown**

  - Poll loop waits up to 1s for daemon to remove its own PID file after SIGTERM

  - rm -f only as fallback, not immediate — avoids racing with daemon cleanup


