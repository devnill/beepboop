id: D-1
type: domain_decision
domain: sound-design
title: Build-time Python, Runtime Shell Split
decision: Sound synthesis runs at build time via Python+synth; the plugin runtime is shell-only with pre-generated WAV files.
rationale: Keeps runtime dependencies minimal (no Python packages required) while allowing expressive programmatic sound design during the build step.
