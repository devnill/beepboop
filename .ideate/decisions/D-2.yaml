id: D-2
type: domain_decision
domain: sound-design
title: Convention-Based 1:1 Hook-to-Sound Naming
decision: Hook event names (e.g. SessionStart, Stop) are used as keys in sounds.py, as WAV filenames, in hooks.json, and in settings.json — a single naming convention across all four artifacts.
rationale: Eliminates mapping layers and makes it trivially easy to trace any event through the full system.
source: architect analysis
