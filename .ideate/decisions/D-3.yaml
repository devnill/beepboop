id: D-3
type: domain_decision
domain: plugin-runtime
title: Silent Exit on Failure
decision: All runtime scripts exit 0 on missing inputs, disabled features, or unavailable system binaries — no errors are surfaced to the user.
rationale: Upholds the graceful degradation principle; a missing audio player or notification tool should not disrupt the Claude Code session.
