id: D-4
type: domain_decision
domain: plugin-runtime
title: Audio Player Auto-Detection with Caching
decision: The audio player (afplay/aplay/paplay/pw-play/powershell) is detected once via platform checks and the result is cached in settings.json.
rationale: Avoids per-invocation detection overhead and allows users to override the detected player without modifying scripts.
