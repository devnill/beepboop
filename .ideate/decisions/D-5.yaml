id: D-5
type: domain_decision
domain: plugin-runtime
title: Selective Notification Triggering
decision: Only Stop and permission/idle-prompt Notification hook events trigger on-screen notifications; all other events play sound only.
rationale: Notifications are reserved for events that require user attention; frequent events (file edits, tool calls) would create notification fatigue.
