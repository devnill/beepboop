id: D-6
type: domain_decision
domain: configuration
title: Single JSON Settings File
decision: All user-configurable settings (sounds_enabled, notifications_enabled, volume, player, hook_sounds) are stored in a single plugin/settings.json file.
rationale: Centralizes configuration, simplifies the /beepboop:config slash command implementation, and keeps the plugin self-contained.
source: architect analysis
