title: Synthesized Robotic Sound Character
rule: "All sounds must be synthesized (not recorded) and carry a robotic personality — melodic tones, chirps, and bleeps in the R2D2 register; no natural sounds or generic beeps. Sounds for error and urgent-attention events may be more alarmed or tense in character."
