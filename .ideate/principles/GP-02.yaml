id: GP-02
type: guiding_principle
name: Clear, Helpful On-Screen Notifications
status: active
description: On-screen notifications should communicate actionable information clearly. When Claude needs user attention, the notification should make it obvious what requires action. Notifications are not decorative — they carry functional signal. This principle guides decisions about notification content, timing, and which hook events warrant a notification vs. a sound-only response. Prefer specificity over brevity when specificity aids the user's response.
