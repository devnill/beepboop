id: GP-03
type: guiding_principle
name: Wide Compatibility with Graceful Degradation
status: active
description: "Beepboop should work across macOS, Linux, and WSL, and across different terminal emulators and multiplexers. When a capability is unavailable on a given platform (e.g., no notification support, no audio player), the plugin should degrade silently without errors or disruption. This principle governs decisions about platform-specific code paths: always provide a fallback, never block the Claude Code session on an unavailable feature, and never surface audio or notification failures to the user as errors."
