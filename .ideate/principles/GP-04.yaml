id: GP-04
type: guiding_principle
name: Low Friction Setup
status: active
description: "Installation and configuration of beepboop should require as few steps as possible. Defaults should work out of the box for the majority of users. Configuration should be accessible via a slash command rather than requiring manual file editing. This principle governs decisions about onboarding, default values, and required dependencies: prefer bundled assets over runtime dependencies, prefer auto-detection over manual configuration, and minimize the number of steps between 'install' and 'working'."
