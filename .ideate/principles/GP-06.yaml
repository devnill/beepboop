id: GP-06
type: guiding_principle
name: Complete Hook Coverage
status: active
description: Every Claude Code hook event must have a corresponding sound in beepboop. No event goes unheard. This is a core invariant of the plugin — if Claude Code adds new hook events, beepboop must be updated to cover them. Completeness is non-negotiable; selective coverage undermines the plugin's core premise of being a full audio layer over Claude Code's lifecycle.
