notes: |-
  ## Objective
  Create a persistent background daemon that receives sound play requests via a Unix domain socket and plays them as a single mixed audio stream via afplay, eliminating simultaneous afplay processes that corrupt macOS audio.

  ## IPC Protocol
  Unix domain socket at `/tmp/beepboop-{uid}.sock` (use `os.getuid()`). Each request is a JSON line: `{"path": "/abs/path/Sound.wav", "volume": 0.8}`. Client writes the line and closes. Server sends no response.

  ## Mixing Architecture
  Maintain a rolling sample buffer using Python `array` module (typecode `'h'`, int16). Two threads:
  1. **Socket listener thread**: accepts connections, parses requests, reads WAV via `wave` module, mixes samples into shared buffer at current write-head position.
  2. **Playback thread**: reads ahead of the play-head, writes mixed PCM to afplay (via temp WAV file or named FIFO if afplay supports it), advances play-head.

  Mixing: sum samples across all active waveforms. Clip to int16 range: `max(-32767, min(32767, sample_sum))`. Apply volume scaling per sound before mixing.

  Alternative simpler approach if streaming is complex: "interrupt and remix" — when new sound arrives during playback, kill current afplay, mix remaining samples + new sound samples, write combined WAV to temp file, start new afplay.

  ## WAV Reading
  `wave.open(path)` — all bundled sounds are 16-bit PCM 44100 Hz. Read frames as bytes, convert via `array.frombytes()`. Multiply each sample by volume float.

  ## Daemon Lifecycle
  - Check PID file on start. If process already alive (`os.kill(pid, 0)` succeeds), exit no-op.
  - Daemonize: `os.fork()` + `os.setsid()` double-fork pattern.
  - SIGTERM handler: close socket, delete socket file and PID file, stop threads, exit.

  ## macOS Only
  Uses afplay. No Linux/WSL code paths.
