notes: |-
  ## Objective
  Two changes to hooks.json in one work item (to avoid concurrent scope collision): (1) add all 7 missing hook events, (2) update SessionEnd to also stop the mixing daemon.

  ## New Hook Entries
  All 7 follow the standard sound-only pattern (no notify.sh chaining):
  ```json
  "StopFailure": { "hooks": [{ "type": "command", "command": "<scripts_dir>/play-sound.sh StopFailure" }] },
  "TaskCreated": { "hooks": [{ "type": "command", "command": "<scripts_dir>/play-sound.sh TaskCreated" }] },
  "PostCompact": { "hooks": [{ "type": "command", "command": "<scripts_dir>/play-sound.sh PostCompact" }] },
  "CwdChanged":  { "hooks": [{ "type": "command", "command": "<scripts_dir>/play-sound.sh CwdChanged" }] },
  "FileChanged": { "hooks": [{ "type": "command", "command": "<scripts_dir>/play-sound.sh FileChanged" }] },
  "Elicitation": { "hooks": [{ "type": "command", "command": "<scripts_dir>/play-sound.sh Elicitation" }] },
  "ElicitationResult": { "hooks": [{ "type": "command", "command": "<scripts_dir>/play-sound.sh ElicitationResult" }] }
  ```
  Match the exact command format used by existing entries (examine hooks.json for the real path pattern).

  ## SessionEnd Update
  Current SessionEnd command: `<scripts_dir>/play-sound.sh SessionEnd`
  Updated: `<scripts_dir>/play-sound.sh SessionEnd && sleep 0.3 && <scripts_dir>/stop-daemon.sh`

  The sleep gives the daemon time to finish playing the SessionEnd sound before SIGTERM.

  ## stop-daemon.sh
  ```sh
  #!/bin/sh
  uid=$(python3 -c 'import os; print(os.getuid())')
  pid_file="/tmp/beepboop-${uid}.pid"
  [ -f "$pid_file" ] || exit 0
  pid=$(cat "$pid_file")
  kill -TERM "$pid" 2>/dev/null || true
  rm -f "$pid_file"
  ```
