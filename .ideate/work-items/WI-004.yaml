notes: |-
  ## Objective
  Add 7 new sound design functions to sounds.py following existing patterns.

  ## Event Character Guidelines

  | Hook | Semantic | Character |
  |------|----------|-----------|
  | StopFailure | Session ended via API error | Descending glitch/minor, alarmed — clearly different from Stop |
  | TaskCreated | Task being created | Short ascending chirp, lighter than TaskCompleted |
  | PostCompact | Compaction complete | Resolution tone, bookend to PreCompact |
  | CwdChanged | Directory changed | Very short (≤150ms) directional blip |
  | FileChanged | Watched file changed | Very short (≤150ms) soft tick/ping |
  | Elicitation | MCP awaiting input | Rising inquisitive tone, held slightly |
  | ElicitationResult | MCP input received | Short affirmative resolution |

  ## Implementation Pattern
  Each sound is a zero-arg function returning np.ndarray. Follow the pattern of existing sounds in sounds.py (examine the file for style and use of `sine`, `sweep`, `fm`, `adsr`, `seq`, `silence`, `SAMPLE_RATE`, `_t`). Import of `_t` is already present at line 10.

  ## SOUNDS Dict
  Append to the existing SOUNDS dict:
  ```python
  'StopFailure': stop_failure,
  'TaskCreated': task_created,
  'PostCompact': post_compact,
  'CwdChanged': cwd_changed,
  'FileChanged': file_changed,
  'Elicitation': elicitation,
  'ElicitationResult': elicitation_result,
  ```
