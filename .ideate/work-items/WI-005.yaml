notes: |-
  ## Objective
  Run the build pipeline to produce WAV files for all 25 hook sounds (7 new + 18 regenerated).

  ## Steps
  1. `git submodule update --init synth/`
  2. `bash generate.sh`
  3. `ls plugin/sounds/*.wav | wc -l` — should return 25
  4. Verify new files: `ls plugin/sounds/StopFailure.wav plugin/sounds/CwdChanged.wav plugin/sounds/FileChanged.wav plugin/sounds/Elicitation.wav plugin/sounds/ElicitationResult.wav plugin/sounds/TaskCreated.wav plugin/sounds/PostCompact.wav`
  5. Commit all new and changed WAV files.

  ## Notes
  generate.sh installs synth with `pip install -e synth/` then runs `synth generate --config synth.toml`. The CLI reads sounds.py and writes one WAV per SOUNDS entry. Existing 18 WAVs are overwritten — this is expected.
