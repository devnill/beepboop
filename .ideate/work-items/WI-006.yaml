notes: |-
  ## Objective
  Fix a critical TOCTOU race in daemon startup plus remove dead code, replace sys.exit with os._exit in fork parents, and add chdir('/').

  ## TOCTOU fix (C1)
  In main(), immediately after _daemonize() call and before os.unlink(_SOCK_PATH), insert a probe-connect block:

  ```python
  _probe = socket.socket(socket.AF_UNIX, socket.SOCK_STREAM)
  try:
      _probe.connect(_SOCK_PATH)
      _probe.close()
      sys.exit(0)  # Live daemon exists — this instance exits.
  except (FileNotFoundError, ConnectionRefusedError):
      pass
  except OSError:
      pass
  finally:
      try:
          _probe.close()
      except Exception:
          pass
  ```

  ## Dead code removal (M1, M2)
  - Delete _elapsed_samples() function (lines 115-121)
  - Delete _pending_start_sample global declaration (line 109)
  - Remove _pending_start_sample from global statement in _start_afplay (line 144)
  - Delete assignment _pending_start_sample = 0 (line 165)

  ## os._exit in fork parents (M3)
  In _daemonize(), replace both sys.exit(0) calls (lines 294 and 302) with os._exit(0).

  ## chdir('/') (M5)
  In _daemonize(), after os.setsid() and before the second fork, add os.chdir('/').
resolution: TOCTOU probe-connect block inserted after _daemonize(). Dead code removed (_elapsed_samples, _pending_start_sample). os._exit(0) replaces sys.exit(0) in fork parents. os.chdir('/') added after setsid().
