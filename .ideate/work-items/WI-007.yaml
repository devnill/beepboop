notes: |-
  ## Objective
  Make the macOS daemon-startup path fully non-blocking, add exception handling to IPC client, fix $PLAYER shell-interpolation in caching block.

  ## Non-blocking daemon startup (S1) + Silent IPC errors (S2)
  Replace the current afplay) case block (lines 73-91) with:

  ```sh
  afplay)
      uid=$(python3 -c 'import os; print(os.getuid())')
      socket_path="/tmp/beepboop-${uid}.sock"
      (
        if [ ! -S "$socket_path" ]; then
          python3 "${PLUGIN_ROOT}/scripts/beepboop-daemon.py" &
          i=0
          while [ $i -lt 10 ] && [ ! -S "$socket_path" ]; do
            sleep 0.05; i=$((i+1))
          done
          [ -S "$socket_path" ] || exit 0
        fi
        python3 -c "
  import socket, json, sys
  try:
      d = json.dumps({'path': sys.argv[1], 'volume': float(sys.argv[2])}).encode()
      s = socket.socket(socket.AF_UNIX, socket.SOCK_STREAM)
      s.connect(sys.argv[3])
      s.sendall(d + b'\n')
      s.close()
  except Exception:
      pass
  " "$SOUND" "$VOLUME" "$socket_path"
      ) 2>/dev/null &
      ;;
  ```

  ## Safe $PLAYER caching (M6)
  Replace the player-caching python3 block (lines 58-63):
  ```sh
      python3 -c "
  import json, sys
  with open(sys.argv[1]) as f: cfg = json.load(f)
  cfg['player'] = sys.argv[2]
  with open(sys.argv[1], 'w') as f: json.dump(cfg, f, indent=2)
  " "$SETTINGS" "$PLAYER" 2>/dev/null
  ```

  ## Design note
  uid and socket_path computation stays outside the subshell (fast, pure). Daemon start, poll, and IPC send go inside ( ... ) 2>/dev/null &. Accepted trade-off: first sound on cold start (SessionStart) may not play if daemon isn't ready in time.
resolution: afplay case block fully wrapped in background subshell ( ... ) 2>/dev/null &. IPC client wrapped in try/except Exception. $PLAYER caching uses sys.argv[2] instead of shell interpolation.
