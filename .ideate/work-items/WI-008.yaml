notes: |-
  ## SessionEnd (S3)
  Change SessionEnd command from:
    play-sound.sh SessionEnd && sleep 0.3 && stop-daemon.sh
  to:
    play-sound.sh SessionEnd; sleep 0.3; stop-daemon.sh

  Use semicolons for unconditional chaining so stop-daemon.sh always runs.

  ## StopFailure notification (MR1)
  Change StopFailure hook entry to:
  ```json
  "StopFailure": [
    {
      "hooks": [
        {
          "type": "command",
          "command": "${CLAUDE_PLUGIN_ROOT}/scripts/play-sound.sh StopFailure && ${CLAUDE_PLUGIN_ROOT}/scripts/notify.sh 'Claude Code' 'Task failed'",
          "timeout": 10
        }
      ]
    }
  ]
  ```
  The && is intentional — notification is conditional on sound succeeding, consistent with the Stop hook pattern.
resolution: SessionEnd uses semicolons for unconditional chaining. StopFailure chains notify.sh 'Task failed' with timeout 10.
