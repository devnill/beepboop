notes: |-
  ## README.md changes (MI1)
  1. Replace '18 Claude Code hook events' with '25 Claude Code hook events'
  2. Add section after Notifications section:

  ## Audio Daemon (macOS)

  On macOS, beepboop uses a persistent audio mixing daemon (`beepboop-daemon.py`) to prevent audio corruption when multiple hooks fire in quick succession. Instead of spawning multiple `afplay` processes, all sounds are mixed into a single stream.

  - **Socket**: `/tmp/beepboop-<uid>.sock`
  - **PID file**: `/tmp/beepboop-<uid>.pid`
  - Auto-starts on the first hook event that plays a sound
  - Automatically stopped on `SessionEnd`

  ### Manual management

  Check if running:
  ```sh
  ps aux | grep beepboop-daemon
  ```

  Stop manually:
  ```sh
  kill $(cat /tmp/beepboop-$(id -u).pid)
  ```

  The daemon auto-starts on the next hook event.

  ## P-1.yaml changes (MI2)
  Update rule field from:
    'All sounds must be synthesized (not recorded) and carry a pleasant, robotic personality — melodic tones, chirps, and bleeps in the R2D2 register; no harsh alarms, natural sounds, or generic beeps.'
  to:
    'All sounds must be synthesized (not recorded) and carry a robotic personality — melodic tones, chirps, and bleeps in the R2D2 register; no natural sounds or generic beeps. Sounds for error and urgent-attention events may be more alarmed or tense in character.'

  Set amended_by to WI-012, set cycle_modified to 1.
